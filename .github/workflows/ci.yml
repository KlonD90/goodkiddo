name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, feat/quiet-telegram-group-presence]

permissions:
  contents: read

jobs:
  telegram-slice:
    name: Telegram Slice checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Telegram and Fetch regression tests
        run: bun test bot/src/channels/telegram.test.ts bot/src/capabilities/fetch/recent_chat_store.test.ts

      - name: Run scoped Biome checks
        working-directory: bot
        run: >-
          bunx biome check
          src/channels/session_commands.ts
          src/channels/telegram.test.ts
          src/channels/telegram/handlers.ts
          src/channels/telegram/turn.ts
          src/permissions/commands.ts
