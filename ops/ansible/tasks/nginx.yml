---
- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Render HTTP-only nginx site
  ansible.builtin.template:
    src: templates/nginx-goodkiddo-http.conf.j2
    dest: "/etc/nginx/sites-available/{{ bot_nginx_site_name }}.conf"
    owner: root
    group: root
    mode: "0644"
  notify: reload nginx

- name: Enable nginx site
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ bot_nginx_site_name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ bot_nginx_site_name }}.conf"
    state: link
    force: true
  notify: reload nginx

- name: Ensure nginx service is enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
