---
- name: Install base system packages
  ansible.builtin.apt:
    name:
      - acl
      - ca-certificates
      - curl
      - gnupg
      - git
      - software-properties-common
    state: present
    update_cache: true

- name: Enable Ubuntu universe repository
  ansible.builtin.command:
    argv:
      - add-apt-repository
      - --yes
      - universe
  register: universe_repository
  changed_when: "'Adding component' in universe_repository.stdout"
  when: ansible_distribution == "Ubuntu"

- name: Install runtime system packages
  ansible.builtin.apt:
    name:
      - docker-compose
      - docker.io
      - nginx
      - unzip
    state: present
    update_cache: true

- name: Install PostgreSQL packages
  ansible.builtin.apt:
    name:
      - postgresql
      - postgresql-client
      - python3-psycopg2
    state: present
  when: bot_manage_postgres

- name: Ensure Google keyring directory exists
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download Google Chrome signing key
  ansible.builtin.get_url:
    url: https://dl.google.com/linux/linux_signing_key.pub
    dest: /tmp/google-linux-signing-key.pub
    mode: "0644"

- name: Install Google Chrome apt keyring
  ansible.builtin.command:
    argv:
      - gpg
      - --dearmor
      - --yes
      - --output
      - /usr/share/keyrings/google-chrome.gpg
      - /tmp/google-linux-signing-key.pub

- name: Install Google Chrome apt source
  ansible.builtin.template:
    src: templates/google-chrome.sources.j2
    dest: /etc/apt/sources.list.d/google-chrome.sources
    owner: root
    group: root
    mode: "0644"

- name: Install Google Chrome Stable
  ansible.builtin.apt:
    name: google-chrome-stable
    state: present
    update_cache: true

- name: Download uv standalone installer
  ansible.builtin.get_url:
    url: "{{ uv_install_script_url }}"
    dest: /tmp/uv-install.sh
    mode: "0755"

- name: Install uv and uvx
  ansible.builtin.command:
    cmd: sh /tmp/uv-install.sh
    creates: "{{ uv_install_dir }}/uvx"
  environment:
    UV_UNMANAGED_INSTALL: "{{ uv_install_dir }}"
    UV_NO_MODIFY_PATH: "1"

- name: Download Bun release archive
  ansible.builtin.get_url:
    url: "{{ bun_download_base }}/bun-linux-{{ bun_archive_suffix }}.zip"
    dest: "/tmp/bun-linux-{{ bun_archive_suffix }}.zip"
    mode: "0644"

- name: Create Bun install directory
  ansible.builtin.file:
    path: "{{ bun_install_dir }}"
    state: directory
    mode: "0755"

- name: Unpack Bun release
  ansible.builtin.unarchive:
    src: "/tmp/bun-linux-{{ bun_archive_suffix }}.zip"
    dest: "{{ bun_install_dir }}"
    remote_src: true

- name: Symlink Bun binary
  ansible.builtin.file:
    src: "{{ bun_install_dir }}/bun-linux-{{ bun_archive_suffix }}/bun"
    dest: /usr/local/bin/bun
    state: link
    force: true

- name: Install agent-browser globally
  ansible.builtin.command:
    cmd: "bun install -g {{ bot_agent_browser_package_spec }}"
  changed_when: true
