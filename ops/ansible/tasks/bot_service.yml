---
- name: Render bot environment file
  ansible.builtin.template:
    src: templates/bot.env.j2
    dest: "{{ bot_env_file }}"
    owner: root
    group: "{{ bot_group }}"
    mode: "0640"
  notify: restart bot service

- name: Render systemd service unit
  ansible.builtin.template:
    src: templates/goodkiddo-bot.service.j2
    dest: "/etc/systemd/system/{{ bot_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart bot service

- name: Ensure bot service is enabled and started
  ansible.builtin.systemd_service:
    name: "{{ bot_service_name }}"
    enabled: true
    state: started

- name: Ensure SearxNG stack service is enabled and started
  ansible.builtin.systemd_service:
    name: "{{ bot_searxng_service_name }}"
    enabled: true
    state: started
